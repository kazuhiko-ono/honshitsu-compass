site:
  name: 本質のコンパス
  site: 'https://wild-4sx.pages.dev'
  base: '/'
  trailingSlash: false

# Default SEO metadata
metadata:
  title:
    default: 本質のコンパス
    template: '%s — 本質のコンパス'
  description: '鍵は、自分の中にある。でも、一人では見えない。本質のコンパス / 小野和彦'
  robots:
    index: true
    follow: true
  openGraph:
    site_name: 本質のコンパス
    images:
      - url: '~/assets/images/default.png'
        width: 1200
        height: 628
    type: website

i18n:
  language: ja
  textDirection: ltr

apps:
  blog:
    isEnabled: true
    postsPerPage: 6

    post:
      isEnabled: true
      permalink: '/%slug%'
      robots:
        index: true

    list:
      isEnabled: true
      pathname: 'articles'
      robots:
        index: true

    category:
      isEnabled: true
      pathname: 'category'
      robots:
        index: true

    tag:
      isEnabled: true
      pathname: 'tag'
      robots:
        index: false

    isRelatedPostsEnabled: true
    relatedPostsCount: 4

analytics:
  vendors:
    googleAnalytics:
      id: null

ui:
  theme: 'system'
